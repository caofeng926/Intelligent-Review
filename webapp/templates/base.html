<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1677ff">
  <title>{% block title %}医保智审知识库{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='mobile.css') }}">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231677ff'/%3E%3Cpath d='M20 22h6v8h12v-8h6v20h-6v-8H26v8h-6z' fill='white'/%3E%3C/svg%3E">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('home') }}">
      <span class="brand-mark">医</span>
      <span class="brand-text">医保智审</span>
    </a>
    <form class="topbar-search" action="{{ url_for('search_view') }}" method="get" role="search">
      <span class="topbar-search-icon" aria-hidden="true">⌕</span>
      <input name="q" type="search" inputmode="search" autocomplete="off"
             placeholder="搜药品/项目/编码/首字母" value="{{ q|default('',true)|h }}" enterkeyhint="search">
      {% if source %}<input type="hidden" name="source" value="{{ source }}">{% endif %}
    </form>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <nav class="bottombar" aria-label="主导航">
    <a class="bb-item {% if request.endpoint=='home' %}is-active{% endif %}" href="{{ url_for('home') }}">
      <span class="bb-ico">⌂</span><span class="bb-label">首页</span>
    </a>
    <a class="bb-item {% if request.endpoint=='search_view' %}is-active{% endif %}" href="{{ url_for('search_view') }}">
      <span class="bb-ico">⌕</span><span class="bb-label">搜索</span>
    </a>
    <a class="bb-item {% if request.endpoint in ['rules_index','rule_detail'] %}is-active{% endif %}" href="{{ url_for('rules_index') }}">
      <span class="bb-ico">≡</span><span class="bb-label">规则</span>
    </a>
    <a class="bb-item {% if request.endpoint in ['nhsa_index','ivd_browse','yp_browse','icd_browse','ms_browse','tcm_browse','hc7_index','ivd_detail','yp_detail','icd_detail','ms_detail','tcm_detail','hc7_detail'] %}is-active{% endif %}" href="{{ url_for('nhsa_index') }}">
      <span class="bb-ico">⊞</span><span class="bb-label">标准库</span>
    </a>
    <a class="bb-item" href="javascript:void(0)" onclick="alert('v1 · 只读查询工具')">
      <span class="bb-ico">ⓘ</span><span class="bb-label">关于</span>
    </a>
  </nav>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
