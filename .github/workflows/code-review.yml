name: Code Review CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint & Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install tools
        run: pip install flake8 isort detect-secrets

      - name: Flake8 语法检查
        run: |
          flake8 webapp/ scripts/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude="webapp/data/,webapp/__pycache__/,_*.py,*.bak.*" \
            || true  # 首期不阻塞，仅报告

      - name: isort 导入排序检查
        run: |
          isort webapp/ scripts/ \
            --profile=black \
            --line-length=120 \
            --skip-glob="_*.py" \
            --check-only --diff \
            || true  # 首期不阻塞，仅报告

      - name: 密钥泄露扫描
        run: |
          detect-secrets scan webapp/ scripts/ \
            --exclude-files '(_.*\.py|.*\.bak.*|.*\.db)' \
            || true  # 首期不阻塞，仅报告

  file-hygiene:
    name: File Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: 检查 .bak 文件
        run: |
          BAK_FILES=$(git ls-files | grep -E '\.bak' || true)
          if [ -n "$BAK_FILES" ]; then
            echo "❌ 仓库中存在 .bak 文件:"
            echo "$BAK_FILES"
            exit 1
          fi
          echo "✅ 无 .bak 文件"

      - name: 检查硬编码密码
        run: |
          if grep -rn "2Vbrm5ah" --include="*.py" --include="*.md" --include="*.yml" .; then
            echo "❌ 检测到硬编码 SSH 密码"
            exit 1
          fi
          echo "✅ 未检测到已知硬编码密码"

      - name: 检查硬编码绝对路径
        run: |
          # 检查旧的硬编码路径 (允许在 _*.py 和 .md 中出现)
          if grep -rn "C:\\\\Users" --include="*.py" webapp/ scripts/; then
            echo "⚠️ 检测到硬编码 Windows 路径"
            grep -rn "C:\\\\Users" --include="*.py" webapp/ scripts/ || true
          fi
          echo "✅ 路径检查完成"
