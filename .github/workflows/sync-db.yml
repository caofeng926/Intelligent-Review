name: Sync kp.db (manual)

# Manual-trigger only. kp.db is ~373 MB; do NOT run on every push.
# The DB is .gitignored, so the runner downloads it from a GitHub release
# and SCPs it to the CVM, then performs an atomic swap + restart.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'GitHub release tag containing kp.db asset (default: kp-db-latest)'
        required: false
        default: 'kp-db-latest'

jobs:
  sync-db:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity-check secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASS: ${{ secrets.SSH_PASS }}
        run: |
          for k in SSH_HOST SSH_USER SSH_PASS; do
            v="${!k}"
            if [ -z "$v" ]; then
              echo "$k: <MISSING or empty>"
            else
              echo "$k: <set, length ${#v}>"
            fi
          done

      - name: Diagnose SSH auth
        env:
          SSHPASS: ${{ secrets.SSH_PASS }}
        run: |
          set +e
          HOST=${{ secrets.SSH_HOST }}
          USER=${{ secrets.SSH_USER }}
          echo "=== test 1: sshpass with -o PreferredAuthentications=password,keyboard-interactive ==="
          sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o PreferredAuthentications=password,keyboard-interactive \
            -o PubkeyAuthentication=no \
            ${USER}@${HOST} "echo PASSWORD_AUTH_OK" 2>&1 | head -5
          echo ""
          echo "=== test 2: ssh -v, grep auth methods ==="
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -o ConnectTimeout=10 \
            ${USER}@${HOST} "echo X" 2>&1 | grep -E "Authentications|method|Permission" | head -10

      - name: Download kp.db from release
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -e
          echo "Downloading kp.db from release: ${RELEASE_TAG}"
          URL="https://github.com/caofeng926/Intelligent-Review/releases/download/${RELEASE_TAG}/kp.db"
          echo "URL: $URL"
          curl -fSL --retry 3 -o kp.db "$URL"
          ls -lh kp.db
          md5sum kp.db

      - name: Install sshpass
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sshpass

      - name: Upload kp.db to CVM
        env:
          SSHPASS: ${{ secrets.SSH_PASS }}
        run: |
          set -e
          HOST=${{ secrets.SSH_HOST }}
          USER=${{ secrets.SSH_USER }}
          REMOTE=/opt/medical-audit/webapp/data
          echo "Uploading kp.db to ${USER}@${HOST}:${REMOTE}/kp.db.bak.new ..."
          sshpass -e scp -P 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PreferredAuthentications=password -o PubkeyAuthentication=no \
            kp.db ${USER}@${HOST}:${REMOTE}/kp.db.bak.new

      - name: Atomic swap + restart + healthcheck
        env:
          SSHPASS: ${{ secrets.SSH_PASS }}
        run: |
          set -e
          HOST=${{ secrets.SSH_HOST }}
          USER=${{ secrets.SSH_USER }}
          sshpass -e ssh -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PreferredAuthentications=password -o PubkeyAuthentication=no \
            ${USER}@${HOST} \
            'set -e
             cd /opt/medical-audit/webapp/data
             if [ ! -f kp.db.bak.new ]; then
               echo "::error::kp.db.bak.new missing on remote"
               exit 1
             fi
             if [ -f kp.db ]; then
               mv kp.db kp.db.bak.$(date +%Y%m%d_%H%M%S)
             fi
             mv kp.db.bak.new kp.db
             ls -lh kp.db kp.db.bak.* 2>/dev/null || true
             systemctl restart medical-audit.service
             sleep 5
             curl -fsS http://127.0.0.1:5000/ >/dev/null && echo "OK healthcheck passed" || (echo "FAIL healthcheck"; exit 1)'
