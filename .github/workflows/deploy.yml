name: Deploy to CVM

on:
  push:
    branches: [main]
    paths:
      - 'webapp/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync webapp/ to CVM (small files only)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          source: "webapp/app.py,webapp/admin.py,webapp/db.py,webapp/search.py,webapp/nhsa_api.py,webapp/nhsa_browse.py,webapp/qa.py,webapp/requirements.txt,webapp/templates,webapp/static"
          target: "/opt/medical-audit/webapp/"
          strip_components: 0
          overwrite: true

      - name: Restart service and healthcheck
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          script: |
            set -e
            systemctl restart medical-audit.service
            sleep 5
            curl -fsS http://127.0.0.1:5000/ >/dev/null && echo "OK healthcheck passed" || (echo "FAIL healthcheck"; exit 1)