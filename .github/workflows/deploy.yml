name: Deploy to CVM

on:
  push:
    branches: [main]
    paths:
      - 'webapp/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity-check secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASS: ${{ secrets.SSH_PASS }}
        run: |
          for k in SSH_HOST SSH_USER SSH_PASS; do
            v="${!k}"
            if [ -z "$v" ]; then
              echo "$k: <MISSING or empty>"
            else
              echo "$k: <set, length ${#v}>"
            fi
          done

      - name: Diagnose SSH auth
        env:
          SSHPASS: ${{ secrets.SSH_PASS }}
        run: |
          set +e
          HOST=${{ secrets.SSH_HOST }}
          USER=${{ secrets.SSH_USER }}
          echo "=== test 1: sshpass with -o PreferredAuthentications=password,keyboard-interactive ==="
          sshpass -e ssh -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o PreferredAuthentications=password,keyboard-interactive \
            -o PubkeyAuthentication=no \
            ${USER}@${HOST} "echo PASSWORD_AUTH_OK" 2>&1 | head -5
          echo ""
          echo "=== test 2: ssh -v, grep auth methods ==="
          ssh -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -o ConnectTimeout=10 \
            ${USER}@${HOST} "echo X" 2>&1 | grep -E "Authentications|method|Permission" | head -10

      - name: Install sshpass
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sshpass

      - name: Sync webapp/ to CVM
        env:
          SSHPASS: ${{ secrets.SSH_PASS }}
        run: |
          set -e
          HOST=${{ secrets.SSH_HOST }}
          USER=${{ secrets.SSH_USER }}
          REMOTE=/opt/medical-audit/webapp
          echo "Syncing webapp/ to ${USER}@${HOST}:${REMOTE}/ ..."
          sshpass -e scp -P 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PreferredAuthentications=password -o PubkeyAuthentication=no \
            webapp/app.py webapp/admin.py webapp/db.py webapp/search.py \
            webapp/nhsa_api.py webapp/nhsa_browse.py webapp/qa.py \
            webapp/requirements.txt \
            ${USER}@${HOST}:${REMOTE}/
          echo "Syncing templates/ ..."
          sshpass -e scp -P 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PreferredAuthentications=password -o PubkeyAuthentication=no -r \
            webapp/templates \
            ${USER}@${HOST}:${REMOTE}/
          echo "Syncing static/ ..."
          sshpass -e scp -P 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PreferredAuthentications=password -o PubkeyAuthentication=no -r \
            webapp/static \
            ${USER}@${HOST}:${REMOTE}/

      - name: Restart + healthcheck
        env:
          SSHPASS: ${{ secrets.SSH_PASS }}
        run: |
          set -e
          HOST=${{ secrets.SSH_HOST }}
          USER=${{ secrets.SSH_USER }}
          sshpass -e ssh -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PreferredAuthentications=password -o PubkeyAuthentication=no \
            ${USER}@${HOST} \
            'systemctl restart medical-audit.service && sleep 5 && \
             curl -fsS http://127.0.0.1:5000/ >/dev/null && echo "OK healthcheck passed" || (echo "FAIL healthcheck"; exit 1)'
